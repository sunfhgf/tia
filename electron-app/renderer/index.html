<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://127.0.0.1:5005; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIA 自动化</title>
  <style>
    :root { --p: #0079c1; --pl: #e3f2fd; --bg: #f5f5f5; --card: #fff; --t: #222; --m: #888; --bd: #ddd; --ok: #4caf50; --err: #e53935; --warn: #ff9800; --r: 6px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--t); }
    header { background: var(--p); color: #fff; padding: 0 20px; height: 46px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
    header .logo { font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    header nav { display: flex; gap: 2px; margin-left: 12px; }
    header nav a { color: rgba(255,255,255,.75); text-decoration: none; padding: 5px 12px; border-radius: var(--r); font-size: 13px; cursor: pointer; }
    header nav a:hover { background: rgba(255,255,255,.15); color: #fff; }
    header nav a.active { background: rgba(255,255,255,.22); color: #fff; }
    header .status { margin-left: auto; font-size: 11px; opacity: .7; }
    .wrap { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
    .card { background: var(--card); border: 1px solid var(--bd); border-radius: var(--r); padding: 18px; margin-bottom: 14px; }
    .card h2 { font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border: 1px solid var(--bd); border-radius: var(--r); background: var(--card); cursor: pointer; font-size: 13px; }
    .btn:hover { border-color: var(--p); color: var(--p); }
    .bp { background: var(--p); color: #fff; border-color: var(--p); }
    .bp:hover { opacity: .85; }
    .bd { color: var(--err); border-color: var(--err); }
    .bd:hover { background: var(--err); color: #fff; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--bd); }
    th { color: var(--m); font-weight: 500; font-size: 12px; }
    tr:hover td { background: var(--pl); }
    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fg label { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: var(--m); }
    .fg input, .fg select { padding: 5px 8px; border: 1px solid var(--bd); border-radius: var(--r); font-size: 13px; }
    .fg input[readonly], td input[readonly] { background: #f7f7f7; color: #666; }
    .device-card h2 { flex-wrap: wrap; }
    .device-meta { color: var(--m); font-size: 11px; font-weight: 400; margin-left: 6px; }
    .device-actions { margin-left: auto; display: flex; gap: 8px; }
    .dev-table-wrap { overflow-x: auto; }
    .device-table { min-width: 980px; }
    .device-table input, .device-table select { padding: 5px 7px; border: 1px solid var(--bd); border-radius: var(--r); font-size: 13px; background: #fff; }
    .device-table .dev-name { width: 120px; }
    .device-table .dev-gsd { width: 390px; max-width: 390px; }
    .device-table .dev-pn { width: 120px; }
    .device-table .dev-ip { width: 125px; }
    .device-table .dev-addr { width: 80px; }
    .device-table .dev-remove { min-width: 36px; justify-content: center; padding: 6px 10px; }
    .device-row-actions { display: flex; gap: 6px; white-space: nowrap; }
    .device-module-row > td { padding: 0; background: #f7f9fb; }
    .device-module-row:hover > td { background: #f7f9fb; }
    .module-editor { padding: 10px 14px 12px 28px; border-bottom: 1px solid var(--bd); }
    .module-editor-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .module-editor-title { font-size: 12px; font-weight: 600; }
    .module-editor-meta { color: var(--m); font-size: 11px; }
    .module-table { min-width: 820px; background: #fff; }
    .module-table th, .module-table td { padding: 5px 7px; }
    .module-table .module-slot { width: 62px; }
    .module-table .module-type { width: 310px; max-width: 310px; }
    .module-table .module-subtype { width: 285px; max-width: 285px; }
    .module-table .module-address { width: 72px; }
    .module-empty { color: var(--m); font-size: 12px; padding: 7px 0; }
    .dz { border: 2px dashed var(--bd); border-radius: var(--r); padding: 28px; text-align: center; color: var(--m); cursor: pointer; transition: .15s; }
    .dz:hover, .dz.over { border-color: var(--p); color: var(--p); background: var(--pl); }
    .dz input { display: none; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .bok { background: #e8f5e9; color: var(--ok); }
    .bwr { background: #fff3e0; color: var(--warn); }
    .ber { background: #ffebee; color: var(--err); }
    .log { background: #1e1e1e; color: #d4d4d4; font-family: 'Cascadia Code', Consolas, monospace; font-size: 12px; padding: 10px; border-radius: var(--r); max-height: 280px; overflow-y: auto; white-space: pre-wrap; }
    .empty { text-align: center; padding: 40px 0; color: var(--m); }
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--bd); margin-bottom: 14px; }
    .tabs a { padding: 7px 14px; font-size: 13px; color: var(--m); text-decoration: none; cursor: pointer; border-bottom: 2px solid transparent; }
    .tabs a:hover { color: var(--t); }
    .tabs a.active { color: var(--p); border-bottom-color: var(--p); }
    .hidden { display: none !important; }
    .issue { padding: 6px 10px; margin: 4px 0; border-radius: var(--r); font-size: 12px; }
    .issue-Error { background: #ffebee; color: var(--err); }
    .issue-Warning { background: #fff3e0; color: var(--warn); }
    .res-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .res-card { padding: 12px; border: 1px solid var(--bd); border-radius: var(--r); }
    .res-card .num { font-size: 24px; font-weight: 700; }
    .res-card .lab { font-size: 12px; color: var(--m); }
  </style>
</head>
<body>
  <header>
    <span class="logo" onclick="nav('projects')">TIA 自动化</span>
    <nav id="mainNav"></nav>
    <span class="status" id="hdrSt"></span>
  </header>
  <div class="wrap" id="app"></div>

  <script>
    const API_BASE = 'http://127.0.0.1:5005';
    // C# JavaScriptSerializer 用 PascalCase；前端用 camelCase。两端互转。
    function toCamel(obj) {
      if (Array.isArray(obj)) return obj.map(toCamel);
      if (obj === null || typeof obj !== 'object') return obj;
      const out = {};
      for (const k of Object.keys(obj)) {
        const ck = k.charAt(0).toLowerCase() + k.slice(1);
        out[ck] = toCamel(obj[k]);
      }
      return out;
    }
    function toPascal(obj) {
      if (Array.isArray(obj)) return obj.map(toPascal);
      if (obj === null || typeof obj !== 'object') return obj;
      const out = {};
      for (const k of Object.keys(obj)) {
        const pk = k.charAt(0).toUpperCase() + k.slice(1);
        out[pk] = toPascal(obj[k]);
      }
      return out;
    }
    const API = {
      async fetch(path, opts = {}) {
        const url = API_BASE + path;
        const headers = { ...opts.headers };
        let body = opts.body;
        // JSON body：转 PascalCase 再发
        if (body && typeof body === 'string' && (headers['Content-Type'] === 'application/json' || !headers['Content-Type'])) {
          try { body = JSON.stringify(toPascal(JSON.parse(body))); } catch {}
        }
        if (opts.method && !body) { headers['Content-Length'] = '0'; delete headers['Content-Type']; }
        else if (body && !headers['Content-Type']) { headers['Content-Type'] = 'application/json'; }
        const res = await fetch(url, { ...opts, body, headers });
        const text = await res.text();
        try { return toCamel(JSON.parse(text)); } catch { return text; }
      },
      async health() { return this.fetch('/api/health'); },
    };
    let view = 'projects', pid = null;
    let autoSaveTimer = null;

    function nav(v, id) { view = v; if (id !== undefined) pid = id; render(); }

    function scheduleAutoSave() {
      if (view !== 'config' || !pid) return;
      clearTimeout(autoSaveTimer);
      const st = document.getElementById('hdrSt');
      if (st) st.textContent = '正在自动保存...';
      autoSaveTimer = setTimeout(() => saveCfg(true), 350);
    }

    function renderNav() {
      const el = document.getElementById('mainNav');
      if (!pid) { el.innerHTML = ''; return; }
      const items = [
        { k: 'config', l: '配置' },
        { k: 'import', l: '导入' },
        { k: 'generate', l: '生成' },
        { k: 'history', l: '历史' },
      ];
      el.innerHTML = items.map(i =>
        `<a class="${view===i.k?'active':''}" onclick="nav('${i.k}')">${i.l}</a>`
      ).join('');
    }

    async function render() {
      renderNav();
      const el = document.getElementById('app');
      const m = { projects: renderList, create: renderCreate, config: renderConfig, import: renderImport, generate: renderGenerate, history: renderHistory };
      await (m[view] || renderList)(el);
    }

    // ── 项目列表 ──
    async function renderList(el) {
      const ps = await API.fetch('/api/projects');
      if (!ps.length) {
        el.innerHTML = `<div class="card"><div class="empty"><p>暂无项目</p><button class="btn bp" onclick="nav('create')">+ 新建项目</button></div></div>`;
        return;
      }
      el.innerHTML = `<div class="card"><h2>项目列表 <button class="btn bp" style="margin-left:auto" onclick="nav('create')">+ 新建</button></h2>
        <table><thead><tr><th>项目名称</th><th>工位</th><th>IO</th><th>伺服</th><th>电机</th><th>气缸</th><th>修改时间</th><th></th></tr></thead>
        <tbody>${ps.map(p=>`<tr>
          <td><a onclick="nav('config','${p.id}')" style="cursor:pointer;color:var(--p)">${esc(p.projectName)}</a></td>
          <td>${p.stationCount}</td><td>${p.ioCount}</td><td>${p.servoCount}</td><td>${p.motorCount}</td><td>${p.cylinderCount}</td>
          <td>${new Date(p.modifiedAt).toLocaleString()}</td>
          <td><button class="btn bd" onclick="delProj('${p.id}')">删除</button></td>
        </tr>`).join('')}</tbody></table></div>`;
    }

    async function renderCreate(el) {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const versionDate = `${yyyy}${mm}${dd}`;
      el.innerHTML = `
      <div class="card"><h2>新建项目</h2>
        <div class="fg">
          <label>项目代号 <input id="nCode" placeholder="如 DM25120" oninput="updateProjectNamePreview()"></label>
          <label>线体/工位 <input id="nStation" placeholder="如 P1" oninput="updateProjectNamePreview()"></label>
          <label>版本日期 <input id="nDate" value="${versionDate}" placeholder="如 20250708" oninput="updateProjectNamePreview()"></label>
          <label>项目名称 <input id="nPreview" value="" readonly placeholder="自动生成：DM25120.P1.V20250708"></label>
          <label>PLC 名称 <input id="nPlcName" placeholder="如 PLC_1"></label>
          <label>PLC IP <input id="nPlcIp" placeholder="如 192.168.1.10"></label>
        </div>
        <p style="color:var(--m);font-size:12px;margin-top:10px">项目名称固定按“项目代号.线体/工位.V版本日期”生成，例如 DM25120.P1.V20250708；创建时会自动复制标准工程并按该名称重命名 .ap20 文件。</p>
        <div style="display:flex;gap:10px;margin-top:12px">
          <button class="btn bp" onclick="createProj()">创建并准备网络配置</button>
          <button class="btn" onclick="nav('projects')">取消</button>
        </div>
        <div id="createMsg" style="margin-top:10px"></div>
      </div>`;
      updateProjectNamePreview();
    }

    function buildProjectName(code, station, date) {
      if (!code || !station || !date) return '';
      return `${code}.${station}.V${date}`.trim();
    }

    function updateProjectNamePreview() {
      const code = document.getElementById('nCode')?.value.trim() || '';
      const station = document.getElementById('nStation')?.value.trim() || '';
      const versionDate = document.getElementById('nDate')?.value.trim() || '';
      const preview = document.getElementById('nPreview');
      if (preview) preview.value = buildProjectName(code, station, versionDate);
    }

    async function createProj() {
      const msg = document.getElementById('createMsg');
      const code = document.getElementById('nCode').value.trim();
      const station = document.getElementById('nStation').value.trim();
      const versionDate = document.getElementById('nDate').value.trim();
      const projectName = buildProjectName(code, station, versionDate);
      const plcName = document.getElementById('nPlcName').value.trim();
      const plcIpAddress = document.getElementById('nPlcIp').value.trim();
      if (!projectName) {
        msg.innerHTML = '<p class="badge ber" style="padding:6px">请完整填写项目代号、线体/工位和版本日期。</p>';
        return;
      }

      msg.innerHTML = '<p style="color:var(--m);font-size:12px">正在复制标准工程并准备网络配置...</p>';
      const body = { projectName, project: { code, station, versionDate, plcName, plcIpAddress, nameFormat: '{code}.{station}.V{date}' } };
      const r = await API.fetch('/api/projects', { method: 'POST', body: JSON.stringify(body) });
      if (!r.id) {
        msg.innerHTML = `<p class="badge ber" style="padding:6px">创建失败：${esc(r.error || '未知错误')}</p>`;
        return;
      }
      if ((r.warnings || []).length) {
        alert(r.warnings.join('\n'));
      }
      nav('config', r.id);
    }
    async function delProj(id) { if (!confirm('确定删除此项目？')) return; await API.fetch(`/api/projects/${id}`, { method: 'DELETE' }); render(); }


    // ── 配置 ──
    async function renderConfig(el) {
      const j = await API.fetch(`/api/projects/${pid}`);
      if (!j) { el.innerHTML = '<div class="empty">项目不存在</div>'; return; }
      const p = j.project || {};
      const displayProjectName = buildProjectName(p.code || '', p.station || '', p.versionDate || '') || j.projectName || '';
      await ensureGsdDevices();
      const deviceAddDisabled = gsdDevices.length ? '' : 'disabled';
      el.innerHTML = `
      <div class="card"><h2>项目信息</h2>
        <div class="fg">
          <label>项目名称 <input id="cN" value="${esc(displayProjectName)}" readonly></label>
          <label>项目代号 <input id="cC" value="${esc(p.code||'')}" placeholder="如 DM25120"></label>
          <label>线体/工位 <input id="cS" value="${esc(p.station||'')}" placeholder="如 P1"></label>
          <label>版本日期 <input id="cD" value="${esc(p.versionDate||'')}" placeholder="如 20250708"></label>
          <label>PLC 名称 <input id="cPlcName" value="${esc(p.plcName||'')}" placeholder="如 PLC_1"></label>
          <label>PLC IP <input id="cPlcIp" value="${esc(p.plcIpAddress||'')}" placeholder="如 192.168.1.10"></label>
          <label>模板工程(.ap20) <input id="cT" value="${esc(j.templateProject||'')}" placeholder="绝对路径"></label>
        </div>
        <div style="margin-top:10px"><button class="btn bp" onclick="saveCfg()">保存</button></div>
      </div>
      <div class="card device-card"><h2>设备 <span class="device-meta">${esc(gsdStatusText())}</span><span class="device-actions"><button class="btn" onclick="refreshGsdDevices()">刷新GSD</button><button class="btn bp" onclick="addDeviceRow()" ${deviceAddDisabled}>+ 添加设备</button></span></h2>
        <div class="dev-table-wrap"><table class="device-table"><thead><tr><th>名称</th><th>类型/GSD</th><th>PROFINET名</th><th>IP</th><th>I起始</th><th>Q起始</th><th></th></tr></thead>
        <tbody id="devTbl">${devRows(j.devices||[])}</tbody></table></div>
      </div>
`;
      const needsServoDefault = (j.devices || []).some(device => {
        const g = gsdDevices[findGsdIndex(device)];
        return !(device.modules || []).length && defaultModulesForGsd(g, device).length > 0;
      });
      if (needsServoDefault) scheduleAutoSave();
    }

    let gsdDevices = [];
    let gsdLoaded = false;
    let gsdMeta = { gsdDir: '', totalFiles: 0, returned: 0, error: '' };

    async function ensureGsdDevices(force = false) {
      if (gsdLoaded && !force) return;
      try {
        const r = await API.fetch('/api/gsd/devices?limit=500');
        gsdDevices = r.devices || [];
        gsdMeta = { gsdDir: r.gsdDir || '', totalFiles: r.totalFiles || 0, returned: r.returned || 0, error: '' };
        gsdLoaded = true;
      } catch (e) {
        gsdDevices = [];
        gsdMeta = { gsdDir: '', totalFiles: 0, returned: 0, error: e?.message || '读取失败' };
        gsdLoaded = true;
      }
    }

    async function refreshGsdDevices() {
      const j = await API.fetch(`/api/projects/${pid}`);
      if (j) {
        collectEdits(j, 'devTbl', 'devices');
        collectEdits(j, 'ioTbl', 'ioPoints');
        collectEdits(j, 'servoTbl', 'servos');
        collectEdits(j, 'stTbl', 'stations');
        await API.fetch(`/api/projects/${pid}`, { method: 'PUT', body: JSON.stringify(j) });
      }
      await ensureGsdDevices(true);
      renderConfig(document.getElementById('app'));
    }

    function gsdStatusText() {
      if (gsdMeta.error) return `项目 GSD 读取失败：${gsdMeta.error}`;
      if (!gsdLoaded) return '正在读取项目 GSD...';
      return `项目 GSD：${gsdMeta.totalFiles || 0} 个文件，${gsdDevices.length || 0} 个型号`;
    }

    function gsdOptionLabel(g) {
      return [g?.displayName, g?.deviceId, g?.fileName].filter(Boolean).join(' · ') || 'GSD 设备';
    }

    function sameText(a, b) {
      return String(a || '').toLowerCase() === String(b || '').toLowerCase();
    }

    function findGsdIndex(device) {
      if (!device) return -1;
      let idx = gsdDevices.findIndex(g =>
        device.gsdFilePath && sameText(g.filePath, device.gsdFilePath) &&
        (!device.accessPointId || sameText(g.accessPointId, device.accessPointId))
      );
      if (idx >= 0) return idx;
      idx = gsdDevices.findIndex(g =>
        device.gsdFileName && sameText(g.fileName, device.gsdFileName) &&
        (!device.accessPointId || sameText(g.accessPointId, device.accessPointId))
      );
      if (idx >= 0) return idx;
      idx = gsdDevices.findIndex(g => device.deviceType && sameText(g.displayName, device.deviceType));
      if (idx >= 0) return idx;
      return gsdDevices.findIndex(g =>
        device.deviceId && sameText(g.deviceId, device.deviceId) &&
        (!device.orderNumber || sameText(g.orderNumber, device.orderNumber))
      );
    }

    function gsdOptions(device) {
      const selected = findGsdIndex(device);
      let html = '';
      if (selected < 0) {
        const label = device?.deviceType ? `未匹配：${device.deviceType}` : '请选择 GSD 型号';
        html += `<option value="" selected>${esc(label)}</option>`;
      }
      if (!gsdDevices.length) {
        html += '<option value="">项目 gsd 目录没有可选设备</option>';
        return html;
      }
      return html + gsdDevices.map((g, i) =>
        `<option value="${i}" ${i === selected ? 'selected' : ''}>${esc(gsdOptionLabel(g))}</option>`
      ).join('');
    }

    function applyGsdToDevice(device, g) {
      if (!device || !g) return;
      device.deviceType = g.displayName || '';
      device.vendorName = g.vendorName || '';
      device.vendorId = g.vendorId || '';
      device.deviceId = g.deviceId || '';
      device.gsdFileName = g.fileName || '';
      device.gsdFilePath = g.filePath || '';
      device.accessPointId = g.accessPointId || '';
      device.orderNumber = g.orderNumber || '';
      device.moduleIdentNumber = g.moduleIdentNumber || '';
      device.mainFamily = g.mainFamily || '';
      device.productFamily = g.productFamily || '';
    }

    function nextDeviceNameFromRows(seed) {
      const prefix = String(seed || 'DEV').replace(/[^A-Za-z0-9]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 18) || 'DEV';
      const names = new Set([...document.querySelectorAll('#devTbl input[data-f="name"]')].map(x => x.value.trim()).filter(Boolean));
      let n = 1;
      while (names.has(`${prefix}_${n}`)) n++;
      return `${prefix}_${n}`;
    }

    async function addDeviceRow() {
      await ensureGsdDevices();
      if (!gsdDevices.length) { alert('项目 gsd 目录没有可选设备'); return; }
      const j = await API.fetch(`/api/projects/${pid}`);
      j.devices = j.devices || [];
      collectEdits(j, 'devTbl', 'devices');
      collectEdits(j, 'ioTbl', 'ioPoints');
      collectEdits(j, 'servoTbl', 'servos');
      collectEdits(j, 'stTbl', 'stations');
      j.devices.push({ name: '', deviceType: '', profinetName: '', ipAddress: '', inputStart: 0, outputStart: 0 });
      await API.fetch(`/api/projects/${pid}`, { method: 'PUT', body: JSON.stringify(j) });
      renderConfig(document.getElementById('app'));
    }

    function onDeviceGsdChange(i) {
      const row = document.querySelector(`#devTbl tr.device-row[data-device-index="${i}"]`);
      const sel = row?.querySelector('select[data-f="gsdIndex"]');
      const g = gsdDevices[+(sel?.value || -1)];
      if (!row || !g) return;
      const nameInput = row.querySelector('input[data-f="name"]');
      const pnInput = row.querySelector('input[data-f="profinetName"]');
      if (nameInput && !nameInput.value.trim()) nameInput.value = nextDeviceNameFromRows(g.orderNumber || g.productFamily || 'DEV');
      if (pnInput) pnInput.value = normalizeProfinetName(nameInput?.value || g.dnsCompatibleName || 'device');
      const defaultModules = defaultModulesForGsd(g, {});
      const moduleCell = document.querySelector(`#deviceModules-${i}`);
      if (moduleCell) moduleCell.innerHTML = moduleEditorHtml({ modules: defaultModules }, g, i);
      const moduleRow = document.querySelector(`#deviceModuleRow-${i}`);
      if (moduleRow) moduleRow.classList.toggle('hidden', defaultModules.length === 0);
      scheduleAutoSave();
    }

    function onDeviceNameInput(i) {
      const row = document.querySelector(`#devTbl tr.device-row[data-device-index="${i}"]`);
      const nameInput = row?.querySelector('input[data-f="name"]');
      const pnInput = row?.querySelector('input[data-f="profinetName"]');
      if (pnInput) pnInput.value = normalizeProfinetName(nameInput?.value || '');
      scheduleAutoSave();
    }

    function isServoGsd(g) {
      const text = [g?.mainFamily, g?.productFamily, g?.displayName, g?.orderNumber].filter(Boolean).join(' ').toLowerCase();
      return /drives|servo|sinamics|v90|s200|sv660/.test(text);
    }

    function firstPosition(spec, fallback = 1) {
      const match = String(spec || '').match(/\d+/);
      return match ? +match[0] : fallback;
    }

    function defaultModulesForGsd(g, device) {
      if (!g || !isServoGsd(g)) return [];
      for (const module of (g.modules || [])) {
        const submodule = (module.submodules || []).find(s => /(?:^|\D)111(?:\D|$)/.test(`${s.id || ''} ${s.name || ''}`));
        if (!submodule) continue;
        return [{
          moduleId: module.id || '', moduleName: module.name || '', moduleIdentNumber: module.moduleIdentNumber || '',
          slot: firstPosition(module.allowedInSlots, 1), submoduleId: submodule.id || '', submoduleName: submodule.name || '',
          submoduleIdentNumber: submodule.submoduleIdentNumber || '', subslot: firstPosition(submodule.allowedInSubslots, 2),
          inputStart: +(device?.inputStart || 0), outputStart: +(device?.outputStart || 0)
        }];
      }
      return [];
    }

    function effectiveDeviceModules(device, g) {
      return (device?.modules || []).length ? device.modules : defaultModulesForGsd(g, device || {});
    }

    function findModuleIndex(g, selected) {
      return (g?.modules || []).findIndex(m => sameText(m.id, selected?.moduleId) || sameText(m.moduleIdentNumber, selected?.moduleIdentNumber));
    }

    function findSubmoduleIndex(module, selected) {
      return (module?.submodules || []).findIndex(s => sameText(s.id, selected?.submoduleId) || sameText(s.submoduleIdentNumber, selected?.submoduleIdentNumber));
    }

    function moduleLabel(module) {
      const io = [module.inputLength ? `I:${module.inputLength}B` : '', module.outputLength ? `Q:${module.outputLength}B` : ''].filter(Boolean).join(' ');
      return [module.name || module.id, module.moduleIdentNumber, io].filter(Boolean).join(' · ');
    }

    function submoduleLabel(submodule) {
      const io = [submodule.inputLength ? `I:${submodule.inputLength}B` : '', submodule.outputLength ? `Q:${submodule.outputLength}B` : ''].filter(Boolean).join(' ');
      return [submodule.name || submodule.id, io].filter(Boolean).join(' · ');
    }

    function moduleOptions(g, selected) {
      const selectedIndex = findModuleIndex(g, selected);
      return (g?.modules || []).map((module, index) =>
        `<option value="${index}" ${index === selectedIndex ? 'selected' : ''}>${esc(moduleLabel(module))}</option>`
      ).join('');
    }

    function submoduleOptions(module, selected) {
      const submodules = module?.submodules || [];
      if (!submodules.length) return '<option value="">固定子模块</option>';
      const selectedIndex = findSubmoduleIndex(module, selected);
      return submodules.map((submodule, index) =>
        `<option value="${index}" ${index === selectedIndex ? 'selected' : ''}>${esc(submoduleLabel(submodule))}</option>`
      ).join('');
    }

    function moduleRowHtml(deviceIndex, moduleIndex, selected, g) {
      let selectedModuleIndex = findModuleIndex(g, selected);
      if (selectedModuleIndex < 0 && (g?.modules || []).length) selectedModuleIndex = 0;
      const module = g?.modules?.[selectedModuleIndex];
      const slot = selected?.slot || firstPosition(module?.allowedInSlots, moduleIndex + 1);
      const subslot = selected?.subslot || firstPosition((module?.submodules || [])[0]?.allowedInSubslots, 0);
      return `<tr data-module-index="${moduleIndex}">
        <td><input class="module-slot" data-mf="slot" type="number" min="1" value="${slot || ''}" oninput="scheduleAutoSave()"></td>
        <td><select class="module-type" data-mf="moduleIndex" onchange="onModuleTypeChange(${deviceIndex},${moduleIndex})">${moduleOptions(g, selected)}</select></td>
        <td><select class="module-subtype" data-mf="submoduleIndex" onchange="scheduleAutoSave()">${submoduleOptions(module, selected)}</select></td>
        <td><input class="module-address" data-mf="inputStart" type="number" min="0" value="${selected?.inputStart ?? ''}" oninput="scheduleAutoSave()"></td>
        <td><input class="module-address" data-mf="outputStart" type="number" min="0" value="${selected?.outputStart ?? ''}" oninput="scheduleAutoSave()"></td>
        <td><input class="module-slot" data-mf="subslot" type="number" min="0" value="${subslot || ''}" oninput="scheduleAutoSave()"></td>
        <td><button class="btn bd dev-remove" onclick="removeDeviceModule(${deviceIndex},${moduleIndex})" title="删除子级">x</button></td>
      </tr>`;
    }

    function moduleEditorHtml(device, g, deviceIndex) {
      const modules = effectiveDeviceModules(device, g);
      if (!(g?.modules || []).length) return '<div class="module-empty">该 GSD 没有可配置的子级模块。</div>';
      return `<div class="module-editor">
        <div class="module-editor-head"><span class="module-editor-title">子级配置</span><span class="module-editor-meta">${isServoGsd(g) ? '伺服默认使用标准报文 111' : `可用模块 ${(g.modules || []).length} 个`}</span><button class="btn" onclick="addDeviceModule(${deviceIndex})">+ 子级</button></div>
        <table class="module-table"><thead><tr><th>槽位</th><th>模块</th><th>子模块/报文</th><th>I 起始</th><th>Q 起始</th><th>子槽</th><th></th></tr></thead>
        <tbody>${modules.map((module, index) => moduleRowHtml(deviceIndex, index, module, g)).join('')}</tbody></table>
        ${modules.length ? '' : '<div class="module-empty">尚未配置子级模块。</div>'}
      </div>`;
    }

    function toggleDeviceModules(deviceIndex) {
      const row = document.querySelector(`#deviceModuleRow-${deviceIndex}`);
      if (row) row.classList.toggle('hidden');
    }

    function onModuleTypeChange(deviceIndex, moduleIndex) {
      const mainRow = document.querySelector(`#devTbl tr.device-row[data-device-index="${deviceIndex}"]`);
      const g = gsdDevices[+(mainRow?.querySelector('select[data-f="gsdIndex"]')?.value || -1)];
      const row = document.querySelector(`#deviceModules-${deviceIndex} tr[data-module-index="${moduleIndex}"]`);
      const moduleSelect = row?.querySelector('select[data-mf="moduleIndex"]');
      const module = g?.modules?.[+(moduleSelect?.value || 0)];
      const submoduleSelect = row?.querySelector('select[data-mf="submoduleIndex"]');
      if (submoduleSelect) submoduleSelect.innerHTML = submoduleOptions(module, {});
      const slotInput = row?.querySelector('input[data-mf="slot"]');
      if (slotInput) slotInput.value = firstPosition(module?.allowedInSlots, moduleIndex + 1);
      const subslotInput = row?.querySelector('input[data-mf="subslot"]');
      if (subslotInput) subslotInput.value = firstPosition(module?.submodules?.[0]?.allowedInSubslots, 0) || '';
      scheduleAutoSave();
    }

    function addDeviceModule(deviceIndex) {
      const mainRow = document.querySelector(`#devTbl tr.device-row[data-device-index="${deviceIndex}"]`);
      const g = gsdDevices[+(mainRow?.querySelector('select[data-f="gsdIndex"]')?.value || -1)];
      if (!(g?.modules || []).length) { alert('该 GSD 没有可配置的子级模块'); return; }
      const tbody = document.querySelector(`#deviceModules-${deviceIndex} .module-table tbody`);
      if (!tbody) return;
      const indexes = [...tbody.querySelectorAll('tr')].map(row => +(row.dataset.moduleIndex || 0));
      const moduleIndex = indexes.length ? Math.max(...indexes) + 1 : 0;
      tbody.insertAdjacentHTML('beforeend', moduleRowHtml(deviceIndex, moduleIndex, {}, g));
      document.querySelector(`#deviceModules-${deviceIndex} .module-empty`)?.remove();
      scheduleAutoSave();
    }

    function removeDeviceModule(deviceIndex, moduleIndex) {
      document.querySelector(`#deviceModules-${deviceIndex} tr[data-module-index="${moduleIndex}"]`)?.remove();
      scheduleAutoSave();
    }
    function normalizeProfinetName(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .split('.')
        .map(part => part.replace(/[^a-z0-9-]+/g, '-').replace(/-+/g, '-').replace(/^-+|-+$/g, ''))
        .filter(Boolean)
        .join('.');
    }
    function nextDeviceName(j, seed) {
      const prefix = String(seed || 'DEV').replace(/[^A-Za-z0-9]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 18) || 'DEV';
      let n = 1;
      const names = new Set((j.devices || []).map(d => d.name));
      while (names.has(`${prefix}_${n}`)) n++;
      return `${prefix}_${n}`;
    }

    function devRows(d) { return (d||[]).map((x,i) => {
      const g = gsdDevices[findGsdIndex(x)];
      const hasModules = effectiveDeviceModules(x, g).length > 0;
      return `<tr class="device-row" data-device-index="${i}">
        <td><input class="dev-name" data-i="${i}" data-f="name" value="${esc(x.name||'')}" oninput="onDeviceNameInput(${i})"></td>
        <td><select class="dev-gsd" data-i="${i}" data-f="gsdIndex" onchange="onDeviceGsdChange(${i})">${gsdOptions(x)}</select></td>
        <td><input class="dev-pn" data-i="${i}" data-f="profinetName" value="${esc(x.profinetName||'')}" oninput="scheduleAutoSave()"></td>
        <td><input class="dev-ip" data-i="${i}" data-f="ipAddress" value="${esc(x.ipAddress||'')}" oninput="scheduleAutoSave()"></td>
        <td><input class="dev-addr" data-i="${i}" data-f="inputStart" value="${x.inputStart||''}" type="number" oninput="scheduleAutoSave()"></td>
        <td><input class="dev-addr" data-i="${i}" data-f="outputStart" value="${x.outputStart||''}" type="number" oninput="scheduleAutoSave()"></td>
        <td><div class="device-row-actions"><button class="btn" onclick="toggleDeviceModules(${i})" title="配置子级">子级${hasModules ? ` ${effectiveDeviceModules(x, g).length}` : ''}</button><button class="btn bd dev-remove" onclick="rmRow('devices',${i})" title="删除设备">x</button></div></td>
      </tr>
      <tr id="deviceModuleRow-${i}" class="device-module-row ${hasModules ? '' : 'hidden'}"><td colspan="7" id="deviceModules-${i}">${moduleEditorHtml(x, g, i)}</td></tr>`;
    }).join(''); }

    function ioRows(d) { return (d||[]).map((x,i)=>`<tr>
      <td><input data-i="${i}" data-f="device" value="${esc(x.device||'')}" style="width:90px"></td>
      <td><input data-i="${i}" data-f="channel" value="${esc(x.channel||'')}" style="width:70px"></td>
      <td><input data-i="${i}" data-f="address" value="${esc(x.address||'')}" placeholder="%I0.0" style="width:70px"></td>
      <td><input data-i="${i}" data-f="tag" value="${esc(x.tag||'')}" style="width:130px"></td>
      <td><input data-i="${i}" data-f="dataType" value="${esc(x.dataType||'Bool')}" style="width:65px"></td>
      <td><input data-i="${i}" data-f="comment" value="${esc(x.comment||'')}" style="width:160px"></td>
      <td><button class="btn bd" onclick="rmRow('ioPoints',${i})">x</button></td></tr>`).join(''); }

    function servoRows(s) { return (s||[]).map((x,i)=>`<tr>
      <td><input data-i="${i}" data-f="name" value="${esc(x.name||'')}" style="width:85px"></td>
      <td><input data-i="${i}" data-f="station" value="${esc(x.station||'')}" style="width:55px"></td>
      <td><input data-i="${i}" data-f="device" value="${esc(x.device||'')}" style="width:90px"></td>
      <td><input data-i="${i}" data-f="axisName" value="${esc(x.axisName||'')}" style="width:90px"></td>
      <td><input data-i="${i}" data-f="telegram" value="${esc(x.telegram||'')}" placeholder="111" style="width:65px"></td>
      <td><input data-i="${i}" data-f="hardwareId" value="${x.hardwareId||''}" style="width:65px" type="number"></td>
      <td><input data-i="${i}" data-f="telegramAddress" value="${x.telegramAddress||''}" style="width:75px" type="number"></td>
      <td><input data-i="${i}" data-f="logicBlock" value="${esc(x.logicBlock||'')}" style="width:90px"></td>
      <td><button class="btn bd" onclick="rmRow('servos',${i})">x</button></td></tr>`).join(''); }

    function stRows(s) { return (s||[]).map((x,i)=>`<tr>
      <td><input data-i="${i}" data-f="id" value="${esc(x.id||'')}" style="width:55px"></td>
      <td><input data-i="${i}" data-f="name" value="${esc(x.name||'')}" style="width:90px"></td>
      <td><input data-i="${i}" data-f="logicBlock" value="${esc(x.logicBlock||'')}" style="width:110px"></td>
      <td><input data-i="${i}" data-f="safetyConditions" value="${esc((x.safetyConditions||[]).join(', '))}" style="width:190px"></td>
      <td><button class="btn bd" onclick="rmRow('stations',${i})">x</button></td></tr>`).join(''); }

    async function saveCfg(silent = false) {
      const j = await API.fetch(`/api/projects/${pid}`);
      const code = document.getElementById('cC').value.trim();
      const station = document.getElementById('cS').value.trim();
      const versionDate = document.getElementById('cD').value.trim();
      const plcName = document.getElementById('cPlcName').value.trim();
      const plcIpAddress = document.getElementById('cPlcIp').value.trim();
      j.projectName = buildProjectName(code, station, versionDate) || document.getElementById('cN').value;
      j.project = j.project || {};
      j.project.code = code;
      j.project.station = station;
      j.project.versionDate = versionDate;
      j.project.plcName = plcName;
      j.project.plcIpAddress = plcIpAddress;
      j.templateProject = document.getElementById('cT').value;
      collectEdits(j, 'devTbl', 'devices');
      collectEdits(j, 'ioTbl', 'ioPoints');
      collectEdits(j, 'servoTbl', 'servos');
      collectEdits(j, 'stTbl', 'stations');
      const saved = await API.fetch(`/api/projects/${pid}`, { method: 'PUT', body: JSON.stringify(j) });
      const st = document.getElementById('hdrSt');
      if (saved?.ok === false || saved?.error) {
        if (st) st.textContent = '保存失败';
        if (!silent) alert(`保存失败：${saved.error || '未知错误'}`);
        return;
      }
      if (st) st.textContent = silent ? `已自动保存 ${new Date().toLocaleTimeString()}` : '已保存';
      if (!silent) {
        alert('已保存');
        renderConfig(document.getElementById('app'));
      }
    }

    function collectEdits(j, tblId, field) {
      if (field === 'devices') { collectDeviceEdits(j); return; }
      if (!j[field]) j[field] = [];
      document.querySelectorAll(`#${tblId} input, #${tblId} select`).forEach(inp => {
        const idx = +inp.dataset.i, f = inp.dataset.f;
        if (!f || Number.isNaN(idx)) return;
        if (!j[field][idx]) j[field][idx] = {};
        let v = inp.value;
        if (['inputStart','outputStart','hardwareId','telegramAddress'].includes(f)) v = v ? +v : 0;
        if (f==='profinetName') v = normalizeProfinetName(v);
        if (f==='safetyConditions') v = v.split(',').map(s=>s.trim()).filter(Boolean);
        j[field][idx][f] = v;
      });
    }

    function collectDeviceEdits(j) {
      j.devices = [];
      document.querySelectorAll('#devTbl tr.device-row').forEach(row => {
        const deviceIndex = +row.dataset.deviceIndex;
        const device = {};
        const gsdIndex = row.querySelector('select[data-f="gsdIndex"]')?.value;
        const g = gsdDevices[+gsdIndex];
        if (g) applyGsdToDevice(device, g);
        device.name = row.querySelector('input[data-f="name"]')?.value.trim() || '';
        device.profinetName = normalizeProfinetName(row.querySelector('input[data-f="profinetName"]')?.value || device.name);
        device.ipAddress = row.querySelector('input[data-f="ipAddress"]')?.value.trim() || '';
        device.inputStart = parseOptionalInt(row.querySelector('input[data-f="inputStart"]')?.value);
        device.outputStart = parseOptionalInt(row.querySelector('input[data-f="outputStart"]')?.value);
        device.modules = [];
        document.querySelectorAll(`#deviceModules-${deviceIndex} .module-table tbody tr`).forEach(moduleRow => {
          const module = g?.modules?.[+(moduleRow.querySelector('select[data-mf="moduleIndex"]')?.value || 0)];
          if (!module) return;
          const submoduleValue = moduleRow.querySelector('select[data-mf="submoduleIndex"]')?.value;
          const submodule = submoduleValue === '' ? null : module.submodules?.[+submoduleValue];
          device.modules.push({
            name: module.name || module.id || '', moduleId: module.id || '', moduleIdentNumber: module.moduleIdentNumber || '',
            slot: parseOptionalInt(moduleRow.querySelector('input[data-mf="slot"]')?.value),
            submoduleId: submodule?.id || '', submoduleName: submodule?.name || '', submoduleIdentNumber: submodule?.submoduleIdentNumber || '',
            subslot: parseOptionalInt(moduleRow.querySelector('input[data-mf="subslot"]')?.value),
            inputStart: parseOptionalInt(moduleRow.querySelector('input[data-mf="inputStart"]')?.value),
            outputStart: parseOptionalInt(moduleRow.querySelector('input[data-mf="outputStart"]')?.value)
          });
        });
        j.devices.push(device);
      });
    }

    function parseOptionalInt(value) {
      const text = String(value ?? '').trim();
      if (!text) return 0;
      const n = parseInt(text, 10);
      return Number.isFinite(n) ? n : 0;
    }

    async function addRow(field) {
      const j = await API.fetch(`/api/projects/${pid}`);
      j[field] = j[field] || [];
      const defaults = {
        devices: {name:'',deviceType:'',profinetName:'',ipAddress:'',inputStart:0,outputStart:0},
        ioPoints: {device:'',channel:'',address:'',tag:'',dataType:'Bool',comment:''},
        servos: {name:'',station:'',device:'',axisName:'',telegram:'',hardwareId:0,telegramAddress:0,logicBlock:''},
        stations: {id:'',name:'',logicBlock:'',safetyConditions:[],devices:[]}
      };
      j[field].push(defaults[field] || {});
      await API.fetch(`/api/projects/${pid}`, { method: 'PUT', body: JSON.stringify(j) });
      renderConfig(document.getElementById('app'));
    }

    async function rmRow(field, idx) {
      const j = await API.fetch(`/api/projects/${pid}`);
      j[field]?.splice(idx, 1);
      await API.fetch(`/api/projects/${pid}`, { method: 'PUT', body: JSON.stringify(j) });
      renderConfig(document.getElementById('app'));
    }
    // ── 导入 ──
    async function renderImport(el) {
      const j = await API.fetch(`/api/projects/${pid}`);
      const c = { io: j.ioPoints?.length||0, servo: j.servos?.length||0, motor: j.motors?.length||0, alarm: j.alarms?.length||0 };
      const tabInfo = [
        { k:'io', l:'IO点', n:c.io },
        { k:'servo', l:'伺服', n:c.servo },
        { k:'motor', l:'电机', n:c.motor },
        { k:'alarm', l:'报警', n:c.alarm },
      ];
      el.innerHTML = `<div class="card"><h2>CSV 导入</h2>
        <p style="color:var(--m);font-size:12px;margin-bottom:14px">拖拽 CSV 文件到下方区域，或点击选择文件。列名自动识别。</p>
        <div class="tabs" id="impTabs">${tabInfo.map(t=>`<a class="${t.k==='io'?'active':''}" onclick="impTab('${t.k}')">${t.l} <span class="badge bok">${t.n}</span></a>`).join('')}</div>
        <div id="impBody"></div></div>`;
      impTab('io');

    let impCat = 'io';
    function impTab(cat) {
      impCat = cat;
      const labels = { io:'IO', servo:'伺服', motor:'电机', alarm:'报警' };
      document.querySelectorAll('#impTabs a').forEach(a => {
        a.classList.toggle('active', a.textContent.includes(labels[cat]));
      });
      document.getElementById('impBody').innerHTML = `
        <div class="dz" id="dz" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="onDrop(event)" onclick="document.getElementById('fi').click()">
          <p>拖拽 ${labels[cat]}.csv 到此处，或点击选择文件</p>
          <input type="file" id="fi" accept=".csv" onchange="onFile(event)">
        </div>
        <div id="impPrev" style="margin-top:10px"></div>`;
    }

    function onDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('over'); if (e.dataTransfer.files.length) upCsv(e.dataTransfer.files[0]); }
    function onFile(e) { if (e.target.files.length) upCsv(e.target.files[0]); }

    async function upCsv(file) {
      const text = await file.text();
      const lines = text.split('\n').filter(l => l.trim());
      const preview = lines.slice(0, 5).join('\n');
      document.getElementById('impPrev').innerHTML = `
        <pre style="background:#f5f5f5;padding:8px;border-radius:4px;font-size:12px;max-height:140px;overflow:auto">${esc(preview)}${lines.length>5?'\n...':''}</pre>
        <p style="margin:6px 0">${lines.length-1} 行数据</p>
        <button class="btn bp" onclick="doImport()">确认导入</button>`;
      window._csv = text;
    }

    async function doImport() {
      const r = await API.fetch(`/api/projects/${pid}/import/${impCat}`, { method: 'POST', body: window._csv, headers: { 'Content-Type': 'text/csv' } });
      if (r.success) {
        document.getElementById('impPrev').innerHTML += `<p class="badge bok" style="font-size:13px;padding:5px 10px;margin-top:6px">已导入 ${r.imported} 行</p>`;
        setTimeout(() => renderImport(document.getElementById('app')), 1200);
      } else {
        document.getElementById('impPrev').innerHTML += `<p class="badge ber" style="font-size:13px;padding:5px 10px;margin-top:6px">错误：${esc(r.error||'未知')}</p>`;
      }
    }

        ${!h.opennessAvailable ? '<p style="color:var(--err);font-size:12px;margin-top:4px">未检测到 Siemens.Engineering.dll；只有复制工程可用，配置写入会跳过</p>' : ''}
      </div>
      <div class="card hidden" id="planCard"><h2>校验结果</h2><div id="planBody"></div></div>
      <div class="card hidden" id="logCard"><h2>日志</h2><div class="log" id="logArea"></div></div>
      <div class="card hidden" id="resCard"><h2>生成结果</h2><div id="resBody"></div></div>`;
    }

    async function runPlan() {
      document.getElementById('planCard').classList.remove('hidden');
      document.getElementById('planBody').innerHTML = '<p style="color:var(--m)">正在校验...</p>';
      const r = await API.fetch(`/api/projects/${pid}/plan`, { method: 'POST' });
      if (r.error) { document.getElementById('planBody').innerHTML = `<p class="badge ber" style="padding:6px">${esc(r.error)}</p>`; return; }
      const errors = (r.issues||[]).filter(i => i.severity === 'Error');
      const warnings = (r.issues||[]).filter(i => i.severity === 'Warning');
      let html = '';
      if (errors.length === 0 && warnings.length === 0) {
        html = '<p class="badge bok" style="padding:6px">校验通过，无错误和警告</p>';
      } else {
        html = `<p style="margin-bottom:8px"><span class="badge ber">${errors.length} 错误</span> <span class="badge bwr">${warnings.length} 警告</span> ${r.canApply ? '<span class="badge bok">可生成</span>' : '<span class="badge ber">不可生成</span>'}</p>`;
        html += (r.issues||[]).map(i => `<div class="issue issue-${i.severity}"><strong>${i.severity==='Error'?'错误':'警告'}</strong> [${i.code}] ${esc(i.message)}</div>`).join('');
      }
      document.getElementById('planBody').innerHTML = html;
    }

    async function runApply() {
      if (!confirm('确定执行生成？将复制当前项目工程；如果已配置 IO/DB/FC 内容，会继续尝试写入。')) return;
      const logCard = document.getElementById('logCard');
      const logArea = document.getElementById('logArea');
      const resCard = document.getElementById('resCard');
      logCard.classList.remove('hidden');
      resCard.classList.add('hidden');
      logArea.textContent = '正在生成...\n';

      const tagTable = document.getElementById('genTag').value || 'TIA_AUTO_IO';
      const j = await API.fetch(`/api/projects/${pid}`);
      const body = { templateProject: j.templateProject, tagTableName: tagTable };

      const t0 = Date.now();
      const r = await API.fetch(`/api/projects/${pid}/apply`, { method: 'POST', body: JSON.stringify(body) });
      const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

      if (r.error) {
        logArea.textContent += `\n错误: ${r.error}\n`;
        if (r.issues) logArea.textContent += r.issues.map(i => `[${i.severity}] ${i.code}: ${i.message}`).join('\n') + '\n';
        return;
      }

      logArea.textContent += `完成，耗时 ${elapsed}s\n`;
      logArea.textContent += `工程: ${r.projectPath}\n`;
      logArea.textContent += `${r.diagnostic || ''}\n\n`;

      // PLC 硬件
      if (r.plcHardware) {
        logArea.textContent += `── PLC 名称/IP ──\n`;
        logArea.textContent += `  成功: ${r.plcHardware.success}  名称: ${r.plcHardware.plcName || '-'}  IP: ${r.plcHardware.ipAddress || '-'}\n`;
        (r.plcHardware.changedObjects||[]).forEach(x => logArea.textContent += `  + ${x}\n`);
        (r.plcHardware.warnings||[]).forEach(x => logArea.textContent += `  ! ${x}\n`);
        (r.plcHardware.attempts||[]).slice(0, 40).forEach(x => logArea.textContent += `  · ${x}\n`);
      }
      // 硬件设备
      if (r.devices) {
        logArea.textContent += `── 硬件设备 ──\n`;
        logArea.textContent += `  成功: ${r.devices.success}  新增: ${(r.devices.createdDevices||[]).length}  跳过: ${(r.devices.skippedDevices||[]).length}  错误: ${(r.devices.errors||[]).length}\n`;
        (r.devices.createdDevices||[]).forEach(x => logArea.textContent += `  + ${x.name}  ${x.catalogTypeName || ''}\n`);
        (r.devices.skippedDevices||[]).forEach(x => logArea.textContent += `  = ${x}\n`);
        (r.devices.changedObjects||[]).forEach(x => logArea.textContent += `  * ${x}\n`);
        (r.devices.errors||[]).forEach(x => logArea.textContent += `  ! ${x}\n`);
        (r.devices.catalogCandidates||[]).slice(0, 8).forEach(x => logArea.textContent += `  ? ${x}\n`);
        (r.devices.attempts||[]).slice(0, 30).forEach(x => logArea.textContent += `  · ${x}\n`);
      }
      // 标签
      if (r.tags) {
        logArea.textContent += `── PLC 标签 ──\n`;
        logArea.textContent += `  成功: ${r.tags.success}  新建: ${(r.tags.createdTags||[]).length}  诊断: ${r.tags.diagnostic}\n`;
      }
      // DB
      if (r.db) {
        logArea.textContent += `── 工位 DB ──\n`;
        logArea.textContent += `  成功: ${r.db.success}  新建: ${(r.db.createdBlocks||[]).length}  警告: ${(r.db.warnings||[]).length}\n`;
        (r.db.createdBlocks||[]).forEach(b => logArea.textContent += `  + ${b.name} (${b.type} / ${b.typeOf})\n`);
      }
      // FC
      [['mappingFc', 'IO映射'], ['servoFc', '伺服'], ['motorFc', '电机'], ['alarmFc', '报警']].forEach(([k, label]) => {
        if (r[k]) logArea.textContent += `── ${label} FC ──  成功: ${r[k].success}  生成: ${(r[k].generatedFcs||[]).length}\n`;
      });

      // 结果卡片
      resCard.classList.remove('hidden');
      const rb = document.getElementById('resBody');
      rb.innerHTML = `
        <div class="res-grid">
          <div class="res-card"><div class="num" style="color:${r.success?'var(--ok)':'var(--err)'}">${r.success?'成功':'失败'}</div><div class="lab">项目文件</div></div>
          <div class="res-card"><div class="num" style="color:${r.plcHardware?.success?'var(--ok)':'var(--t)'}">${r.plcHardware ? (r.plcHardware.success ? '成功' : '未改') : '-'}</div><div class="lab">PLC 名称/IP</div></div>
          <div class="res-card"><div class="num" style="color:${r.devices?.success?'var(--ok)':'var(--t)'}">${r.devices ? ((r.devices.createdDevices?.length||0) + '/' + (r.devices.errors?.length||0)) : '-'}</div><div class="lab">硬件设备 新增/错误</div></div>
          <div class="res-card"><div class="num">${(r.mappingFc?.generatedFcs?.length||0)+(r.servoFc?.generatedFcs?.length||0)+(r.motorFc?.generatedFcs?.length||0)+(r.alarmFc?.generatedFcs?.length||0)}</div><div class="lab">生成 FC</div></div>
          <div class="res-card"><div class="num">${elapsed}s</div><div class="lab">耗时</div></div>
        </div>
        ${(r.db?.warnings||[]).length ? '<h3 style="margin-top:12px;color:var(--warn)">DB 警告</h3>' + r.db.warnings.map(w=>`<div class="issue issue-Warning">${esc(w)}</div>`).join('') : ''}
        ${(r.mappingFc?.warnings||[]).length ? '<h3 style="margin-top:12px;color:var(--warn)">IO映射 FC 警告</h3>' + r.mappingFc.warnings.map(w=>`<div class="issue issue-Warning">${esc(w)}</div>`).join('') : ''}
        <p style="margin-top:12px;color:var(--m);font-size:12px">输出目录: ${esc(r.projectPath||'')}</p>`;
    }

    // ── 历史 ──
    async function renderHistory(el) {
      const runs = await API.fetch(`/api/projects/${pid}/runs`);
      if (!runs || !runs.length) {
        el.innerHTML = '<div class="card"><div class="empty">暂无生成记录</div></div>';
        return;
      }
      el.innerHTML = `<div class="card"><h2>生成历史</h2>
        <table><thead><tr><th>时间</th><th>状态</th><th>标签</th><th>DB</th><th>FC</th></tr></thead>
        <tbody>${runs.map(r => {
          const res = r.result || {};
          const ok = !!res.success || !!res.tags?.success;
          const tagOk = !!res.tags?.success;
          const dbCount = res.db?.createdBlocks?.length || 0;
          const fcCount = (res.mappingFc?.generatedFcs?.length||0) + (res.servoFc?.generatedFcs?.length||0) + (res.motorFc?.generatedFcs?.length||0) + (res.alarmFc?.generatedFcs?.length||0);
          return `<tr>
            <td>${r.dir}</td>
            <td><span class="badge ${ok?'bok':'ber'}">${ok?'成功':'失败'}</span></td>
            <td>${tagOk ? '已写入' : (res.copiedOnly ? '仅复制' : '-')}</td>
            <td>${dbCount} 个</td>
            <td>${fcCount} 个</td>
          </tr>`;
        }).join('')}</tbody></table></div>`;
    }

    // ── 工具 ──
    function esc(s) { if (s==null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

    // ── 启动 ──
    (async () => {
      try {
        const h = await API.health();
        document.getElementById('hdrSt').textContent = `v${h.version} · ${h.opennessAvailable ? 'Openness 就绪' : 'Openness 未就绪'}`;
      } catch {
        document.getElementById('hdrSt').textContent = '未连接';
      }
      render();
    })();
  </script>
</body>
</html>
